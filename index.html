<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snehal | AI Engineer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1115; /* Deep tech dark background */
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-gray-200 h-screen flex flex-col items-center justify-center p-4 sm:p-8">

    <!-- Main Chat Container -->
    <main class="glass-panel w-full max-w-3xl h-full max-h-[800px] flex flex-col rounded-2xl shadow-2xl overflow-hidden relative">
        
        <!-- Header -->
        <header class="flex items-center justify-between p-5 border-b border-gray-800 bg-[#0f1115] z-10">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-600 flex items-center justify-center text-white font-bold shadow-lg">
                        S
                    </div>
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#0f1115] rounded-full"></span>
                </div>
                <div>
                    <h1 class="font-semibold text-gray-100 tracking-wide text-sm sm:text-base">Snehal's AI Clone</h1>
                    <p class="text-xs text-gray-400">AI & Backend Engineer</p>
                </div>
            </div>
            <a href="mailto:snehalnarayan8@gmail.com" class="text-gray-400 hover:text-cyan-400 transition-colors" title="Contact Human Snehal">
                <i data-lucide="mail" class="w-5 h-5"></i>
            </a>
        </header>

        <!-- Chat Area -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-6 scrollbar-hide flex flex-col">
            <!-- Initial AI Welcome Message -->
            <div class="flex gap-4">
                <div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="bot" class="w-4 h-4 text-cyan-400"></i>
                </div>
                <div class="bg-gray-800 text-gray-200 px-5 py-3 rounded-2xl rounded-tl-sm max-w-[85%] sm:max-w-[75%] text-sm leading-relaxed shadow-sm border border-gray-700/50">
                    Hi, I'm an Querty, Snehal's AI assistant. I can answer questions about Snehal's skills, projects, and academic background. Feel free to ask me anything related to his technical portfolio!
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-[#0f1115] border-t border-gray-800">
            <form id="chat-form" class="relative flex items-center">
                <input 
                    type="text" 
                    id="chat-input" 
                    class="w-full bg-gray-900 border border-gray-700 text-gray-100 text-sm rounded-full pl-5 pr-12 py-3 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all shadow-inner"
                    placeholder="Ask about Snehal's skills, projects, or education..."
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="absolute right-2 p-2 bg-cyan-600 hover:bg-cyan-500 text-white rounded-full transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </form>
        </div>
    </main>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');

        // FastAPI Backend URL (Localhost for now)
        const BACKEND_URL = 'http://127.0.0.1:8000/chat';

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendUserMessage(message) {
            const div = document.createElement('div');
            div.className = 'flex gap-4 self-end flex-row-reverse';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-cyan-900 flex items-center justify-center flex-shrink-0 border border-cyan-700">
                    <i data-lucide="user" class="w-4 h-4 text-cyan-300"></i>
                </div>
                <div class="bg-cyan-600 text-white px-5 py-3 rounded-2xl rounded-tr-sm max-w-[85%] sm:max-w-[75%] text-sm leading-relaxed shadow-md">
                    ${message}
                </div>
            `;
            chatBox.appendChild(div);
            lucide.createIcons({ root: div });
            scrollToBottom();
        }

        function appendAIMessage(message, sources = null) {
            const div = document.createElement('div');
            div.className = 'flex gap-4';
            
            let sourceHtml = '';
            if (sources > 0) {
                sourceHtml = `<div class="mt-2 text-[10px] text-gray-500 font-mono flex items-center gap-1"><i data-lucide="database" class="w-3 h-3"></i></div>`;
            }

            // Convert simple line breaks to HTML breaks for better formatting
            const formattedMessage = message.replace(/\n/g, '<br>');

            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0 border border-gray-700">
                    <i data-lucide="bot" class="w-4 h-4 text-cyan-400"></i>
                </div>
                <div class="bg-gray-800 text-gray-200 px-5 py-3 rounded-2xl rounded-tl-sm max-w-[85%] sm:max-w-[75%] text-sm leading-relaxed shadow-sm border border-gray-700/50">
                    ${formattedMessage}
                    ${sourceHtml}
                </div>
            `;
            chatBox.appendChild(div);
            lucide.createIcons({ root: div });
            scrollToBottom();
        }

        function appendLoadingIndicator() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex gap-4';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gray-800 flex items-center justify-center flex-shrink-0 border border-gray-700">
                    <i data-lucide="bot" class="w-4 h-4 text-cyan-400"></i>
                </div>
                <div class="bg-gray-800 px-5 py-4 rounded-2xl rounded-tl-sm flex items-center gap-1 shadow-sm border border-gray-700/50">
                    <div class="w-2 h-2 bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-500 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-gray-500 rounded-full typing-dot"></div>
                </div>
            `;
            chatBox.appendChild(div);
            scrollToBottom();
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const query = chatInput.value.trim();
            if (!query) return;

            // 1. Lock UI & Show User Message
            chatInput.value = '';
            chatInput.disabled = true;
            sendBtn.disabled = true;
            appendUserMessage(query);

            // 2. Show AI Loading State
            const loadingId = appendLoadingIndicator();

            try {
                // 3. Call FastAPI Backend
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                // 4. Remove loading and show AI response
                removeElement(loadingId);
                appendAIMessage(data.reply, data.sources_used);

            } catch (error) {
                console.error("Fetch error:", error);
                removeElement(loadingId);
                appendAIMessage("System Error: Unable to connect to the FastAPI backend. Make sure uvicorn is running on port 8000.");
            } finally {
                // 5. Unlock UI
                chatInput.disabled = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        });
    </script>
</body>
</html>
